spring:
  application:
    name: nexus-ledger-core
  profiles:
    active: local 
  
  jackson:
    serialization:
      indent-output: true
  
  web:
    error:
      include-message: always

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always