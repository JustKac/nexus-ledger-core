services:
  nexus-db:
    image: postgres:16-alpine
    container_name: nexus-ledger-db
    environment:
      POSTGRES_DB: nexus_ledger
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: nexus-adminer
    restart: always
    ports:
      - "8081:8080" # Acessível em localhost:8081

volumes:
  pgdata: